<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logging Out...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  
  
  
    <body class="bg-body-tertiary" style="font-family: Ariel, sans-serif;">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg bg-body-secondary shadow-sm" style="padding: 0.5rem 0; font-weight: bold; font-size: medium">
            <div class="container-fluid">
                <a class="navbar-brand" href="">The Chefs</a>
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                    <a class="nav-link disabled" aria-current="page" href="">Home</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link" href="/feed">Feed</a>
                    </li>
                    
                </ul>
                <ul class="navbar-nav ms-auto" id="userNav">
                    
                </ul>
            </div>
        </nav>

        <script>
            async function setNavbar() {
                const list = document.getElementById('userNav')

                const response = await fetch('/api/v1/loggedIn',{
                    method: 'GET',
                    headers: {'Content-Type': 'application/json'}
                });

                const data = await response.json();
                console.log(data.loggedIn);
                if (!data.loggedIn) {
                    list.innerHTML = `
                    <li class="nav-item">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" >/</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/register">Register</a>
                    </li>`;
                }
                else {
                    list.innerHTML = `
                    <li class="nav-item">
                        <a class="nav-link" href="/profile">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" >/</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">Logout</a>
                    </li>`;
                }
            }

            //Logs the user out and sends them home
            async function logout(){
                const response = await fetch('/api/v1/logout', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });

                if (!response.ok) {
                    console.error('Logout failed');
                    return;
                }

                window.location.href = '/';
            }



            document.addEventListener('DOMContentLoaded', setNavbar);
            document.addEventListener('DOMContentLoaded', logout);

        </script>



    </body>
</html>
